name: Build and Push DSpace Backend Image (URI)

on:
  push:
    branches:
      - dspace-9.x
      - dspace-10.x
    paths:
      - 'dspace/config/**'
      - 'Dockerfile.build'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v6

      - name: 🐋 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/dspace
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dspace-10.x' }}

      - name: 🏗️ Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=dspace-backend
          cache-to: type=gha,mode=max,scope=dspace-backend

      - name: 🧾 Image digest
        run: echo "✅ Image pushed with digest ${{ steps.build.outputs.digest }}"
